name: Release Binary

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release

      - name: Package release assets
        run: |
          mkdir -p dist
          cp target/release/abs_opds dist/abs_opds-linux-x86_64
          cd dist
          tar -czf abs_opds-linux-x86_64.tar.gz abs_opds-linux-x86_64
          sha256sum abs_opds-linux-x86_64.tar.gz > abs_opds-linux-x86_64.tar.gz.sha256

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/abs_opds-linux-x86_64.tar.gz
            dist/abs_opds-linux-x86_64.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
